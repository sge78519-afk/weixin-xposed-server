name: Build APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android SDK (system JDK)
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platforms;android-28" "build-tools;28.0.3"

      - name: Set up JDK 8 (for Gradle 4.6)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Replace jcenter with mavenCentral
        run: |
          sed -i 's/jcenter()/mavenCentral()/g' build.gradle
          # fix gradle wrapper for JDK 8 compatibility
          echo "org.gradle.jvmargs=-Xmx1024m" >> gradle.properties

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: weixin-xposed-server-apk
          path: app/build/outputs/apk/release/*.apk
