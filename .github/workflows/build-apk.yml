name: Build Signed APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android SDK (system JDK)
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platforms;android-28" "build-tools;28.0.3"

      - name: Set up JDK 8 (for Gradle 4.6)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Replace jcenter + fix Gradle
        run: |
          sed -i 's/jcenter()/mavenCentral()/g' build.gradle
          echo "org.gradle.jvmargs=-Xmx1024m" >> gradle.properties

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Dev, O=Dev, L=City, ST=State, C=CN"

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Unsigned APK: $APK"
          $ANDROID_HOME/build-tools/28.0.3/zipalign -v 4 "$APK" app/build/outputs/apk/release/aligned.apk
          $ANDROID_HOME/build-tools/28.0.3/apksigner sign --ks debug.keystore --ks-pass pass:android --ks-key-alias androiddebugkey --key-pass pass:android app/build/outputs/apk/release/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: weixin-xposed-server-signed
          path: app/build/outputs/apk/release/aligned.apk
